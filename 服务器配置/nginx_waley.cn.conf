server {
    listen 80;
    listen [::]:80;
    server_name waley.cn www.waley.cn 106.53.207.188;
    root /www/waley.cn;
    index index.html;
    charset utf-8;

    location /v8/ {
        alias /www/v8/;
        try_files $uri $uri/ =404;
    }

    location = /index.html {
        alias /www/v8/index.html;
        add_header Cache-Control "no-cache";
    }

    location /assets {
        alias /www/waley-agent-backend/waley-agent-backend/dist/public/assets;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /ws/chat {
        proxy_pass http://127.0.0.1:3000/ws/chat;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

    location /api/trpc {
        proxy_pass http://127.0.0.1:3000/api/trpc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /trpc {
        proxy_pass http://127.0.0.1:3000/api/trpc;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Agent SPA routes
    location ~ ^/(diagnostic-chat|device|diagnosis|knowledge-base|fault-cases|visualization|login|register) {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        try_files /index.html =404;
    }

    # Hermes API Server proxy
    location /hermes/ {
        proxy_pass http://127.0.0.1:8642/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300;
    }

    # Hermes WebSocket support
    location /hermes-ws/ {
        proxy_pass http://127.0.0.1:8642/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
    }

}